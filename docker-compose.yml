version: '3.8'

services:
  # ==========================================
  # 数据库服务: PostgreSQL 14
  # ==========================================
  postgres:
    image: postgres:14-bookworm
    container_name: demo-agent-postgres
    restart: always
    environment:
      # 设置时区为上海
      TZ: Asia/Shanghai
      # ⚠️ 注意: 请与 backend/.env 中的参数保持一致
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root123456}
      POSTGRES_DB: ${DB_NAME:-claude_agent}
    ports:
      - "30306:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agent-network

  # ==========================================
  # 后端服务: FastAPI Agent
  # ==========================================
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: demo-agent-backend
    restart: always
    depends_on:
      - postgres
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8000:8000"
    volumes:
      # 将 skills 挂载出来，方便在宿主机随时实时修改 MD 文件并热加载
      - ./backend/skills:/app/skills
      # 将 AGENTS.md 挂载，方便热修改提示词
      - ./backend/AGENTS.md:/app/AGENTS.md
    networks:
      - agent-network

  # ==========================================
  # 前端服务: Vue 3 + Nginx
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: demo-agent-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - agent-network
    # 如果 frontend 镜像构建时需要 API 地址的环境变量，可通过 args 注入，并在 Dockerfile 处理。
    # 这里通过 Nginx 运行，对于前端环境变量的控制如果写死在打包静态文件里，建议在宿主机先打好包。

volumes:
  postgres_data:

networks:
  agent-network:
    driver: bridge
